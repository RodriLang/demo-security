spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/ludoteca_utn}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:89012535}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.example.demosecurity: DEBUG

jwt:
  secret: ${JWT_SECRET:miClaveSuperSecretaParaJwtCodificadaEnBase64}
  expiration: 15m
  refresh-expiration: 7d